<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ZONA ZERO — Sopravvivi. Trasmetti. Ripeti.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap');
:root{--black:#0a0a0a;--anth:#1a1a1a;--metal:#2a2a2a;--metal-lt:#3a3a3a;--steel:#555;--hazard:#d4a017;--haz-dim:#8a6a10;--orange:#c06a20;--green:#33cc55;--green-dim:#1a7a30;--red:#cc3333;--wdirty:#b8b0a0;--wclean:#e0dcd4;--tbody:#9a9488;--tdim:#605a50;--brd:#333}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--black);color:var(--wdirty);font-family:'Barlow',sans-serif;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);opacity:.5}
.ctr{max-width:1200px;margin:0 auto;padding:0 24px}
.sp{padding:100px 0}
.hbar{height:6px;background:repeating-linear-gradient(-45deg,var(--hazard) 0,var(--hazard) 10px,var(--black) 10px,var(--black) 20px);opacity:.7}
.hbar.t{height:3px;opacity:.4}
.slbl{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--haz-dim);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.slbl::before{content:'';display:block;width:30px;height:1px;background:var(--haz-dim)}
.stit{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.5rem);letter-spacing:3px;color:var(--wclean);line-height:1.1;margin-bottom:20px}
.sdsc{max-width:700px;color:var(--tbody);font-size:15px;line-height:1.8}
/* NAV */
.nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:rgba(10,10,10,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);transition:transform .3s}
.nav-in{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1200px;margin:0 auto}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--hazard);display:flex;align-items:center;gap:8px;cursor:default}
.nav-logo .dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pd 2s infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
.nlinks{display:flex;gap:24px;list-style:none}
.nlinks a{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--tbody);text-decoration:none;transition:color .3s;position:relative}
.nlinks a:hover{color:var(--hazard)}
.nlinks a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--hazard);transition:width .3s}
.nlinks a:hover::after{width:100%}
.burger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:8px}
.burger span{width:22px;height:2px;background:var(--wdirty)}
/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(180deg,#050505,#0d0d0d 40%,#111)}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(212,160,23,.06),transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(51,204,85,.04),transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(192,106,32,.05),transparent 60%)}
.hero-noise{position:absolute;inset:0;opacity:.08;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(51,204,85,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(51,204,85,.03) 1px,transparent 1px);background-size:60px 60px}
.hero-vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.7))}
.hero-c{text-align:center;position:relative;z-index:2;padding:40px 24px}
.hero-tag{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:6px;color:var(--green);margin-bottom:24px;animation:fl 4s infinite}
@keyframes fl{0%,95%,100%{opacity:1}96%{opacity:.4}97%{opacity:1}98%{opacity:.6}}
.hero-tit{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,14vw,12rem);letter-spacing:clamp(8px,2vw,24px);color:var(--wclean);line-height:.9;margin-bottom:16px;text-shadow:0 0 80px rgba(212,160,23,.15)}
.hero-claim{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1rem,3vw,1.8rem);letter-spacing:8px;text-transform:uppercase;color:var(--hazard);font-weight:600;margin-bottom:32px}
.hero-desc{max-width:560px;margin:0 auto 40px;color:var(--tbody);font-size:15px;line-height:1.8}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:3px;text-transform:uppercase;padding:14px 32px;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s}
.btn-p{background:var(--hazard);color:var(--black)}.btn-p:hover{background:var(--wclean)}
.btn-g{background:transparent;color:var(--wdirty);border:1px solid var(--steel)}.btn-g:hover{border-color:var(--hazard);color:var(--hazard)}
.hero-stats{margin-top:48px;display:flex;justify-content:center;gap:40px;flex-wrap:wrap}
.hstat{text-align:center}
.hstat-v{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--hazard);letter-spacing:2px}
.hstat-l{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--tdim);text-transform:uppercase}
/* SIGNAL */
.sig{background:var(--anth);position:relative;overflow:hidden}
.sig::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(51,204,85,.04),transparent 60%);pointer-events:none}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.sig-txt h2{margin-bottom:24px}
.sig-txt p{margin-bottom:16px;color:var(--tbody);line-height:1.9;font-size:15px}
.sig-pan{background:var(--metal);border:1px solid var(--brd);padding:32px;position:relative}
.sig-pan::before{content:'TRANSMISSION LOG';position:absolute;top:-1px;left:20px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--black);background:var(--haz-dim);padding:2px 10px}
.sp-line{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--green);line-height:2.2;border-bottom:1px solid rgba(51,204,85,.08);padding:4px 0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px}
.sp-line .dm{color:var(--tdim);font-size:11px}
.sp-line .vl{color:var(--green)}.sp-line .wr{color:var(--orange)}.sp-line .al{color:var(--red)}
.blink{animation:bk 1.5s step-end infinite}@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
/* RADIO */
.rad{background:var(--black)}.rad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.rc{background:var(--anth);border:1px solid var(--brd);padding:28px;position:relative;overflow:hidden;transition:border-color .3s,transform .3s}
.rc:hover{border-color:var(--haz-dim);transform:translateY(-2px)}
.rc::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--green),transparent);opacity:.5}
.rc-icon{width:40px;height:40px;border:1px solid var(--green-dim);display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--green)}
.rc h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--wclean);margin-bottom:8px}
.rc p{font-size:13px;color:var(--tbody);line-height:1.7}
.rc .ctag{margin-top:16px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--haz-dim);letter-spacing:2px}
.rfbar{margin-top:48px;background:var(--metal);border:1px solid var(--brd);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.rfi{font-family:'Share Tech Mono',monospace;font-size:12px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dg{background:var(--green);box-shadow:0 0 6px var(--green)}.dor{background:var(--orange);box-shadow:0 0 6px var(--orange)}.dr{background:var(--red);box-shadow:0 0 6px var(--red)}
/* FLEET */
.flt{background:var(--anth);position:relative;overflow:hidden}
.flt::before{content:'';position:absolute;top:0;right:0;width:50%;height:100%;background:radial-gradient(ellipse at right center,rgba(212,160,23,.03),transparent 70%);pointer-events:none}
.flt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:48px}
.fc{background:var(--black);border:1px solid var(--brd);overflow:hidden;transition:border-color .4s,box-shadow .4s}
.fc:hover{border-color:var(--haz-dim);box-shadow:0 0 40px rgba(212,160,23,.05)}
.fc-hdr{background:var(--metal);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd)}
.fc-code{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--hazard);letter-spacing:2px}
.fc-st{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.fc-st.act{color:var(--green)}.fc-st.sby{color:var(--orange)}
.fc-img{height:220px;background:var(--metal);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.fc-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(10,10,10,.9));pointer-events:none}
.fc-img .ph{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:6px;color:var(--metal-lt);opacity:.4}
.fc-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.fc-body{padding:24px}
.fc-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--wclean);margin-bottom:4px}
.fc-role{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.fc-desc{font-size:14px;color:var(--tbody);line-height:1.8;margin-bottom:20px}
.ftags{display:flex;flex-wrap:wrap;gap:8px}
.ftag{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--tdim);border:1px solid var(--metal-lt);padding:4px 10px;text-transform:uppercase}
.ftag:first-child{border-color:var(--haz-dim);color:var(--haz-dim)}
/* WORKSHOP */
.wrk{background:var(--black)}
.wrk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:48px;counter-reset:step}
.ws{background:var(--anth);border:1px solid var(--brd);padding:32px 24px;position:relative;overflow:hidden;counter-increment:step;transition:border-color .3s}
.ws:hover{border-color:var(--orange)}
.ws::before{content:counter(step,decimal-leading-zero);font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--metal);position:absolute;top:12px;right:16px;line-height:1}
.ws h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:12px;position:relative;z-index:1}
.ws p{font-size:13px;color:var(--tbody);line-height:1.8;position:relative;z-index:1}
/* GALLERY */
.gal{background:var(--anth)}
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:48px}
.gi{aspect-ratio:4/3;background:var(--metal);position:relative;overflow:hidden;cursor:pointer;border:1px solid var(--brd)}
.gi:hover .gov{opacity:1}.gi:hover img,.gi:hover .gph{transform:scale(1.05)}
.gph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--metal),var(--metal-lt));transition:transform .6s}
.gph span{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--metal-lt);letter-spacing:4px;opacity:.5}
.gi img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:transform .6s}
.gov{position:absolute;inset:0;background:rgba(10,10,10,.85);display:flex;flex-direction:column;justify-content:flex-end;padding:20px;opacity:0;transition:opacity .4s;z-index:2}
.gov .cap{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--hazard);letter-spacing:2px;text-transform:uppercase}
.gov .sub{font-size:12px;color:var(--tdim);margin-top:4px}
/* DECALS */
.dcl{background:var(--black)}
.dcl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:48px}
.di{background:var(--anth);border:1px solid var(--brd);padding:24px;text-align:center;transition:border-color .3s}
.di:hover{border-color:var(--haz-dim)}
.di-s{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--hazard);margin-bottom:8px;letter-spacing:2px}
.di-n{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--tdim);letter-spacing:2px;text-transform:uppercase}
/* FOOTER */
.ft{background:var(--black);border-top:1px solid var(--brd);padding:60px 0 40px}
.ft-in{text-align:center}
.ft-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:10px;color:var(--hazard);margin-bottom:8px}
.ft-claim{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:6px;text-transform:uppercase;color:var(--steel);margin-bottom:24px}
.ft-txt{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--tdim);line-height:2;max-width:500px;margin:0 auto}
.ft-bot{margin-top:40px;padding-top:20px;border-top:1px solid var(--metal);font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--tdim);letter-spacing:1px}
/* ANIM */
.rv{opacity:0;transform:translateY(30px);transition:opacity .8s,transform .8s}.rv.vis{opacity:1;transform:translateY(0)}
.rd1{transition-delay:.1s}.rd2{transition-delay:.2s}.rd3{transition-delay:.3s}
/* LIGHTBOX */
.lb{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.95);justify-content:center;align-items:center;cursor:pointer}
.lb.on{display:flex}.lb img{max-width:90vw;max-height:90vh;object-fit:contain;border:1px solid var(--brd)}
/* LOGIN */
.lov{display:none;position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.95);justify-content:center;align-items:center}
.lov.on{display:flex}
.lbox{background:var(--anth);border:1px solid var(--brd);padding:40px;max-width:360px;width:90%;text-align:center;position:relative}
.lbox::before{content:'AUTENTICAZIONE';position:absolute;top:-1px;left:20px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--black);background:var(--red);padding:2px 10px}
.lbox h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;color:var(--hazard);margin:12px 0 8px}
.lbox p{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--tdim);margin-bottom:20px}
.lbox input{width:100%;padding:12px;background:var(--metal);border:1px solid var(--brd);color:var(--wclean);font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;text-align:center;outline:none;margin-bottom:12px}
.lbox input:focus{border-color:var(--hazard)}
.lerr{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);margin-bottom:10px;min-height:16px}
.lcancel{margin-top:10px;background:none;border:none;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--tdim);cursor:pointer}
/* ADMIN */
.aov{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);overflow-y:auto}
.aov.on{display:block}
.apan{max-width:960px;margin:30px auto;padding:28px;background:var(--anth);border:1px solid var(--brd);position:relative}
.apan::before{content:'CMS ZONA ZERO';position:absolute;top:-1px;left:20px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--black);background:var(--hazard);padding:2px 12px}
.ax{position:absolute;top:12px;right:16px;background:none;border:1px solid var(--steel);color:var(--wdirty);font-family:'Share Tech Mono',monospace;font-size:12px;padding:6px 14px;cursor:pointer;letter-spacing:2px;transition:all .3s}
.ax:hover{border-color:var(--red);color:var(--red)}
.atit{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--hazard);margin:16px 0 4px}
.asub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--tdim);letter-spacing:2px;margin-bottom:20px}
.atabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.atab{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:8px 14px;border:1px solid var(--brd);background:var(--metal);color:var(--tdim);cursor:pointer;text-transform:uppercase;transition:all .2s}
.atab.on{background:var(--hazard);color:var(--black);border-color:var(--hazard)}
.atab:hover:not(.on){border-color:var(--haz-dim);color:var(--wdirty)}
.asec{margin-bottom:20px;padding:18px;background:var(--metal);border:1px solid var(--brd)}
.asec-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--brd)}
.arow{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.albl{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--haz-dim);letter-spacing:1px;min-width:110px;flex-shrink:0}
.ainp{flex:1;min-width:180px;padding:7px 10px;background:var(--black);border:1px solid var(--brd);color:var(--wclean);font-family:'Share Tech Mono',monospace;font-size:12px;outline:none}
.ainp:focus{border-color:var(--hazard)}
.ata{width:100%;min-height:60px;padding:7px 10px;background:var(--black);border:1px solid var(--brd);color:var(--wclean);font-family:'Barlow',sans-serif;font-size:13px;outline:none;resize:vertical}
.ata:focus{border-color:var(--hazard)}
.abtn{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 12px;border:1px solid var(--steel);background:var(--anth);color:var(--wdirty);cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap}
.abtn:hover{border-color:var(--green);color:var(--green)}
.abtn.dng{border-color:var(--red);color:var(--red);opacity:.7}.abtn.dng:hover{opacity:1}
.abtn.add{border-color:var(--green);color:var(--green)}
.acard{background:var(--black);border:1px solid var(--brd);padding:14px;margin-bottom:10px}
.acard-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.acard-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--wclean)}
.aprv{width:60px;height:45px;background:var(--black);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.aprv img{width:100%;height:100%;object-fit:cover}
.aprv .ni{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--tdim)}
.afile{display:none}
.ast{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--green);letter-spacing:1px;min-height:14px;margin-top:6px}
.agalgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.agslot{background:var(--black);border:1px solid var(--brd);padding:10px;text-align:center}
.agslot .aprv{width:100%;height:60px;margin-bottom:6px}
.agslot .sl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--tdim);margin-bottom:4px}
@media(max-width:900px){.sig-grid{grid-template-columns:1fr;gap:40px}.rad-grid{grid-template-columns:1fr}.flt-grid{grid-template-columns:1fr}.gal-grid,.agalgrid{grid-template-columns:repeat(2,1fr)}.nlinks{display:none}.burger{display:flex}.nlinks.open{display:flex;flex-direction:column;position:absolute;top:100%;left:0;width:100%;background:rgba(10,10,10,.95);padding:20px 24px;gap:16px;border-bottom:1px solid var(--brd)}}
@media(max-width:600px){.gal-grid,.agalgrid{grid-template-columns:1fr}.hero-stats{gap:20px}.sp{padding:60px 0}.apan{margin:10px;padding:14px}.flt-grid{gap:16px}}
</style>

const SK='zz_data2',IK='zz_i_';
// Firebase save/load
function sv(){REF_DATA.set(D);localStorage.setItem(SK,JSON.stringify(D))}
function gi(k){return localStorage.getItem(IK+k)||null}
function si(k,v){localStorage.setItem(IK+k,v);REF_IMG.child(k).set(v)}
function di(k){localStorage.removeItem(IK+k);REF_IMG.child(k).remove()}

// Load from Firebase on start, fallback to localStorage
let D=DD();
let firebaseReady=false;

function initFromFirebase(){
  REF_DATA.once('value').then(snap=>{
    const val=snap.val();
    if(val){D=val;localStorage.setItem(SK,JSON.stringify(D))}
    else{const loc=localStorage.getItem(SK);if(loc)try{D=JSON.parse(loc)}catch(e){D=DD()}}
    return REF_IMG.once('value');
  }).then(snap=>{
    const imgs=snap.val();
    if(imgs){Object.keys(imgs).forEach(k=>{localStorage.setItem(IK+k,imgs[k])})}
    firebaseReady=true;
    render();
  }).catch(()=>{
    const loc=localStorage.getItem(SK);
    if(loc)try{D=JSON.parse(loc)}catch(e){D=DD()}
    firebaseReady=true;
    render();
  });
}

// Listen for realtime changes
REF_DATA.on('value',snap=>{
  if(!firebaseReady)return;
  const val=snap.val();
  if(val){D=val;localStorage.setItem(SK,JSON.stringify(D));render()}
});
REF_IMG.on('child_changed',snap=>{
  if(!firebaseReady)return;
  localStorage.setItem(IK+snap.key,snap.val());render();
});
REF_IMG.on('child_removed',snap=>{
  if(!firebaseReady)return;
  localStorage.removeItem(IK+snap.key);render();
});

function rsi(file,key,cb){const r=new FileReader();r.onload=function(e){const img=new Image();img.onload=function(){const M=800;let w=img.width,h=img.height;if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M}else{w=Math.round(w*M/h);h=M}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);try{si(key,c.toDataURL('image/jpeg',.75));cb&&cb()}catch(x){sst('ERRORE: localStorage pieno!')}};img.src=e.target.result};r.readAsDataURL(file)}
